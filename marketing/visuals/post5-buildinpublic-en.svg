<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffdf8"/>
      <stop offset="100%" style="stop-color:#fef3e2"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="10" flood-color="#c8773a" flood-opacity="0.10"/></filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="900" cy="180" r="300" fill="#fbbf24" opacity="0.05" filter="url(#blur)"/>
  <circle cx="100" cy="860" r="250" fill="#f97316" opacity="0.05" filter="url(#blur)"/>

  <rect x="330" y="72" width="420" height="46" rx="23" fill="#f97316" fill-opacity="0.10" stroke="#f97316" stroke-opacity="0.25" stroke-width="1"/>
  <text x="540" y="101" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="2">BUILDING IN PUBLIC</text>

  <text x="540" y="214" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800" fill="#5c3d1e" text-anchor="middle">I built this</text>
  <text x="540" y="298" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800" fill="url(#orange)" text-anchor="middle">alone. 🧠</text>

  <rect x="80" y="352" width="920" height="390" rx="24" fill="white" stroke="#ddd5c8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="410" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#b0998a">The problem:</text>
  <text x="140" y="448" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="600" fill="#5c3d1e">I was losing every idea I had.</text>
  <text x="140" y="480" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#b0998a">WhatsApp self-notes · iPhone memos · random post-its</text>
  <text x="140" y="506" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#b0998a">Nothing was actionable. Everything was chaos.</text>
  <line x1="140" y1="532" x2="940" y2="532" stroke="#ddd5c8" stroke-width="1"/>
  <text x="140" y="570" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#b0998a">The solution:</text>
  <text x="140" y="608" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="600" fill="#5c3d1e">Stop organising. Let AI do it.</text>
  <text x="140" y="642" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#b0998a">Type anything → AI categorises, detects dates, structures</text>
  <text x="140" y="668" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#b0998a">everything automatically. Zero friction.</text>
  <line x1="140" y1="694" x2="940" y2="694" stroke="#ddd5c8" stroke-width="1"/>
  <text x="140" y="720" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#f97316">→ Built solo  ·  React + Flask + GPT  ·  100% free  ·  dropleapp.com</text>

  <rect x="80" y="776" width="278" height="118" rx="20" fill="white" stroke="#ddd5c8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="219" y="832" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="url(#orange)" text-anchor="middle">7</text>
  <text x="219" y="864" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#b0998a" text-anchor="middle">languages</text>

  <rect x="401" y="776" width="278" height="118" rx="20" fill="white" stroke="#ddd5c8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="540" y="832" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="url(#orange)" text-anchor="middle">0€</text>
  <text x="540" y="864" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#b0998a" text-anchor="middle">to use</text>

  <rect x="722" y="776" width="278" height="118" rx="20" fill="white" stroke="#ddd5c8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="861" y="832" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="url(#orange)" text-anchor="middle">∞</text>
  <text x="861" y="864" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#b0998a" text-anchor="middle">ideas captured</text>

  <text x="540" y="984" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="url(#orange)" text-anchor="middle">dropleapp.com · #buildinpublic</text>
</svg>
