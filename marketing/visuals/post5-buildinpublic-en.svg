<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="300" fill="#fbbf24" opacity="0.04" filter="url(#blur)"/>
  <circle cx="100" cy="850" r="250" fill="#f97316" opacity="0.05" filter="url(#blur)"/>

  <rect x="330" y="72" width="420" height="48" rx="24" fill="#f97316" fill-opacity="0.12" stroke="#f97316" stroke-opacity="0.3" stroke-width="1"/>
  <text x="540" y="102" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" font-weight="600" fill="#f97316" text-anchor="middle" letter-spacing="2">BUILDING IN PUBLIC</text>

  <text x="540" y="218" font-family="SF Pro Display, -apple-system, sans-serif" font-size="76" font-weight="800" fill="#e6edf3" text-anchor="middle">I built this</text>
  <text x="540" y="304" font-family="SF Pro Display, -apple-system, sans-serif" font-size="76" font-weight="800" fill="url(#orange)" text-anchor="middle">alone. 🧠</text>

  <rect x="80" y="354" width="920" height="390" rx="24" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="140" y="412" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#7d8590">The problem:</text>
  <text x="140" y="450" font-family="SF Pro Display, -apple-system, sans-serif" font-size="25" font-weight="600" fill="#e6edf3">I was losing every idea I had.</text>
  <text x="140" y="482" font-family="SF Pro Display, -apple-system, sans-serif" font-size="19" fill="#7d8590">WhatsApp self-notes · iPhone memos · random post-its</text>
  <text x="140" y="508" font-family="SF Pro Display, -apple-system, sans-serif" font-size="19" fill="#7d8590">Nothing was actionable. Everything was chaos.</text>

  <line x1="140" y1="534" x2="940" y2="534" stroke="#30363d" stroke-width="1"/>

  <text x="140" y="572" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#7d8590">The solution:</text>
  <text x="140" y="610" font-family="SF Pro Display, -apple-system, sans-serif" font-size="25" font-weight="600" fill="#e6edf3">Stop organising. Let AI do it.</text>
  <text x="140" y="644" font-family="SF Pro Display, -apple-system, sans-serif" font-size="19" fill="#7d8590">Type anything → AI categorises, finds dates, structures</text>
  <text x="140" y="670" font-family="SF Pro Display, -apple-system, sans-serif" font-size="19" fill="#7d8590">everything automatically. Zero friction.</text>

  <line x1="140" y1="696" x2="940" y2="696" stroke="#30363d" stroke-width="1"/>
  <text x="140" y="722" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" fill="#f97316">→ Built solo  ·  React + Flask + GPT  ·  100% free  ·  dropleapp.com</text>

  <!-- Stats -->
  <rect x="80" y="776" width="278" height="120" rx="20" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="219" y="832" font-family="SF Pro Display, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#orange)" text-anchor="middle">7</text>
  <text x="219" y="866" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" fill="#7d8590" text-anchor="middle">languages</text>

  <rect x="401" y="776" width="278" height="120" rx="20" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="540" y="832" font-family="SF Pro Display, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#orange)" text-anchor="middle">0€</text>
  <text x="540" y="866" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" fill="#7d8590" text-anchor="middle">to use</text>

  <rect x="722" y="776" width="278" height="120" rx="20" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="861" y="832" font-family="SF Pro Display, -apple-system, sans-serif" font-size="44" font-weight="800" fill="url(#orange)" text-anchor="middle">∞</text>
  <text x="861" y="866" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" fill="#7d8590" text-anchor="middle">ideas captured</text>

  <text x="540" y="986" font-family="SF Pro Display, -apple-system, sans-serif" font-size="26" font-weight="700" fill="url(#orange)" text-anchor="middle">dropleapp.com · #buildinpublic</text>
</svg>
