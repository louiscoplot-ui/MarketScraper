<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="300" fill="#a371f7" opacity="0.05" filter="url(#blur)"/>
  <circle cx="100" cy="850" r="250" fill="#58a6ff" opacity="0.05" filter="url(#blur)"/>

  <!-- Badge -->
  <rect x="350" y="80" width="380" height="48" rx="24" fill="#a371f7" fill-opacity="0.12" stroke="#a371f7" stroke-opacity="0.3" stroke-width="1"/>
  <text x="540" y="110" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" font-weight="600" fill="#a371f7" text-anchor="middle" letter-spacing="2">BUILDING IN PUBLIC</text>

  <!-- Big text -->
  <text x="540" y="230" font-family="SF Pro Display, -apple-system, sans-serif" font-size="74" font-weight="800" fill="#ffffff" text-anchor="middle">I built this</text>
  <text x="540" y="316" font-family="SF Pro Display, -apple-system, sans-serif" font-size="74" font-weight="800" fill="url(#accent)" text-anchor="middle">alone. 🧠</text>

  <!-- Story text -->
  <rect x="80" y="370" width="920" height="380" rx="24" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="140" y="428" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" fill="#8b949e">The problem:</text>
  <text x="140" y="462" font-family="SF Pro Display, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#ffffff">I was losing every idea I had.</text>
  <text x="140" y="494" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#8b949e">WhatsApp notes-to-self · iPhone memos · random post-its</text>
  <text x="140" y="522" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#8b949e">Nothing was actionable. Everything was chaos.</text>

  <line x1="140" y1="548" x2="940" y2="548" stroke="#30363d" stroke-width="1"/>

  <text x="140" y="586" font-family="SF Pro Display, -apple-system, sans-serif" font-size="22" fill="#8b949e">The solution:</text>
  <text x="140" y="620" font-family="SF Pro Display, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#ffffff">Stop organising. Let AI do it for you.</text>
  <text x="140" y="654" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#8b949e">Type anything → AI categorises, detects dates, structures</text>
  <text x="140" y="682" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#8b949e">everything automatically. No friction.</text>

  <line x1="140" y1="706" x2="940" y2="706" stroke="#30363d" stroke-width="1"/>

  <text x="140" y="730" font-family="SF Pro Display, -apple-system, sans-serif" font-size="19" fill="#58a6ff">→ Built solo  ·  React + Flask + GPT  ·  100% free  ·  dropleapp.com</text>

  <!-- Stats row -->
  <rect x="80" y="780" width="270" height="120" rx="20" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="215" y="832" font-family="SF Pro Display, -apple-system, sans-serif" font-size="40" font-weight="800" fill="url(#accent)" text-anchor="middle">7</text>
  <text x="215" y="868" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">languages</text>

  <rect x="405" y="780" width="270" height="120" rx="20" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="540" y="832" font-family="SF Pro Display, -apple-system, sans-serif" font-size="40" font-weight="800" fill="url(#accent)" text-anchor="middle">0€</text>
  <text x="540" y="868" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">to use</text>

  <rect x="730" y="780" width="270" height="120" rx="20" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="865" y="832" font-family="SF Pro Display, -apple-system, sans-serif" font-size="40" font-weight="800" fill="url(#accent)" text-anchor="middle">∞</text>
  <text x="865" y="868" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">ideas captured</text>

  <text x="540" y="990" font-family="SF Pro Display, -apple-system, sans-serif" font-size="26" font-weight="700" fill="url(#accent)" text-anchor="middle">dropleapp.com · #buildinpublic</text>
</svg>
