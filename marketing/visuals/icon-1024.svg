<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <ellipse cx="512" cy="480" rx="280" ry="260" fill="#f97316" opacity="0.08" filter="url(#softglow)"/>

  <!-- Drop shape -->
  <path d="M512 180
    C512 180, 330 360, 330 510
    C330 608 412 688 512 688
    C612 688 694 608 694 510
    C694 360 512 180 512 180 Z"
    fill="url(#drop)" filter="url(#glow)"/>

  <!-- Shine -->
  <path d="M512 180
    C512 180, 330 360, 330 510
    C330 608 412 688 512 688
    C612 688 694 608 694 510
    C694 360 512 180 512 180 Z"
    fill="url(#shine)"/>

  <!-- Star spark -->
  <text x="512" y="540"
    font-family="Arial, Helvetica, sans-serif"
    font-size="160" font-weight="900"
    fill="#0d1117" fill-opacity="0.85"
    text-anchor="middle" dominant-baseline="middle">✦</text>

  <!-- Wordmark -->
  <text x="512" y="840"
    font-family="Arial, Helvetica, sans-serif"
    font-size="90" font-weight="800"
    fill="#e6edf3" fill-opacity="0.92"
    text-anchor="middle" letter-spacing="-2">drople</text>
</svg>
