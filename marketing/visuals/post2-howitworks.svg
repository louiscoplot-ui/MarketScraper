<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffdf8"/>
      <stop offset="100%" style="stop-color:#fef3e2"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#c8773a" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="900" cy="180" r="240" fill="#fbbf24" opacity="0.06" filter="url(#blur)"/>
  <circle cx="100" cy="880" r="220" fill="#f97316" opacity="0.05" filter="url(#blur)"/>

  <text x="540" y="108" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#b0998a" text-anchor="middle" letter-spacing="3">COMMENT ÇA MARCHE</text>
  <text x="540" y="184" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" fill="#5c3d1e" text-anchor="middle">3 secondes.</text>
  <text x="540" y="252" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" fill="url(#orange)" text-anchor="middle">C'est tout.</text>

  <!-- Step 1 -->
  <rect x="60" y="300" width="290" height="350" rx="22" fill="white" stroke="#ddd5c8" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="205" cy="370" r="32" fill="#f97316" fill-opacity="0.10" stroke="#f97316" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="205" y="378" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#f97316" text-anchor="middle">1</text>
  <text x="205" y="448" font-family="Arial, Helvetica, sans-serif" font-size="52">⌨️</text>
  <text x="205" y="526" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#5c3d1e" text-anchor="middle">Tu tapes</text>
  <text x="205" y="554" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#b0998a" text-anchor="middle">n'importe quoi,</text>
  <text x="205" y="576" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#b0998a" text-anchor="middle">dans ta langue</text>
  <text x="205" y="614" font-family="Arial, Helvetica, sans-serif" font-size="28" text-anchor="middle">💬</text>

  <text x="393" y="500" font-family="Arial, Helvetica, sans-serif" font-size="50" fill="url(#orange)" text-anchor="middle">→</text>

  <!-- Step 2 -->
  <rect x="395" y="300" width="290" height="350" rx="22" fill="white" stroke="#ddd5c8" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="540" cy="370" r="32" fill="#fbbf24" fill-opacity="0.14" stroke="#fbbf24" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="540" y="378" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#c8773a" text-anchor="middle">2</text>
  <text x="540" y="448" font-family="Arial, Helvetica, sans-serif" font-size="52" text-anchor="middle">✦</text>
  <text x="540" y="526" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#5c3d1e" text-anchor="middle">L'IA analyse</text>
  <text x="540" y="554" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#b0998a" text-anchor="middle">réécrit, classe,</text>
  <text x="540" y="576" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#b0998a" text-anchor="middle">ajoute une date</text>
  <text x="540" y="614" font-family="Arial, Helvetica, sans-serif" font-size="28" text-anchor="middle">🤖</text>

  <text x="728" y="500" font-family="Arial, Helvetica, sans-serif" font-size="50" fill="url(#orange)" text-anchor="middle">→</text>

  <!-- Step 3 -->
  <rect x="730" y="300" width="290" height="350" rx="22" fill="white" stroke="#ddd5c8" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="875" cy="370" r="32" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="875" y="378" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#059669" text-anchor="middle">3</text>
  <text x="875" y="448" font-family="Arial, Helvetica, sans-serif" font-size="52">✅</text>
  <text x="875" y="526" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#5c3d1e" text-anchor="middle">C'est rangé</text>
  <text x="875" y="554" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#b0998a" text-anchor="middle">to-do, idées, notes,</text>
  <text x="875" y="576" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#b0998a" text-anchor="middle">appels… tout trié</text>
  <text x="875" y="614" font-family="Arial, Helvetica, sans-serif" font-size="28">🗂️</text>

  <!-- Example -->
  <rect x="108" y="704" width="864" height="192" rx="20" fill="white" stroke="#ddd5c8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="750" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#b0998a">Tu tapes :</text>
  <text x="160" y="784" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#5c3d1e" font-style="italic">"faut que jappelle le dentiste mardi et acheter du lait"</text>
  <line x1="160" y1="806" x2="920" y2="806" stroke="#ddd5c8" stroke-width="1"/>
  <text x="160" y="838" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#b0998a">Drople crée :</text>
  <rect x="328" y="822" width="96" height="28" rx="8" fill="#3b82f611" stroke="#3b82f644" stroke-width="1"/>
  <text x="376" y="841" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle">📞 Call</text>
  <rect x="440" y="822" width="110" height="28" rx="8" fill="#34d39911" stroke="#34d39944" stroke-width="1"/>
  <text x="495" y="841" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#059669" text-anchor="middle">✓ To-do</text>
  <text x="582" y="841" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#b0998a">📅 Mardi détecté</text>

  <text x="540" y="960" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="url(#orange)" text-anchor="middle">dropleapp.com</text>
</svg>
