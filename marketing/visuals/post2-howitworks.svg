<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="140" cy="200" r="220" fill="#f97316" opacity="0.06" filter="url(#blur)"/>
  <circle cx="950" cy="880" r="260" fill="#fbbf24" opacity="0.05" filter="url(#blur)"/>

  <text x="540" y="110" font-family="SF Pro Display, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#7d8590" text-anchor="middle" letter-spacing="3">COMMENT ÇA MARCHE</text>
  <text x="540" y="188" font-family="SF Pro Display, -apple-system, sans-serif" font-size="66" font-weight="800" fill="#e6edf3" text-anchor="middle">3 secondes.</text>
  <text x="540" y="254" font-family="SF Pro Display, -apple-system, sans-serif" font-size="66" font-weight="800" fill="url(#orange)" text-anchor="middle">C'est tout.</text>

  <!-- Step 1 -->
  <rect x="60" y="310" width="290" height="350" rx="24" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="205" cy="376" r="34" fill="#f97316" fill-opacity="0.14" stroke="#f97316" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="205" y="384" font-family="SF Pro Display, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#f97316" text-anchor="middle">1</text>
  <text x="205" y="453" font-family="SF Pro Display, -apple-system, sans-serif" font-size="54">⌨️</text>
  <text x="205" y="534" font-family="SF Pro Display, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#e6edf3" text-anchor="middle">Tu tapes</text>
  <text x="205" y="562" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" fill="#7d8590" text-anchor="middle">n'importe quoi,</text>
  <text x="205" y="584" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" fill="#7d8590" text-anchor="middle">dans ta langue</text>
  <text x="205" y="620" font-family="SF Pro Display, -apple-system, sans-serif" font-size="30" text-anchor="middle">💬</text>

  <!-- Arrow 1 -->
  <text x="395" y="506" font-family="SF Pro Display, -apple-system, sans-serif" font-size="52" fill="url(#orange)" text-anchor="middle">→</text>

  <!-- Step 2 -->
  <rect x="395" y="310" width="290" height="350" rx="24" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="540" cy="376" r="34" fill="#fbbf24" fill-opacity="0.14" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="540" y="384" font-family="SF Pro Display, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#fbbf24" text-anchor="middle">2</text>
  <text x="540" y="453" font-family="SF Pro Display, -apple-system, sans-serif" font-size="54" text-anchor="middle">✦</text>
  <text x="540" y="534" font-family="SF Pro Display, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#e6edf3" text-anchor="middle">L'IA analyse</text>
  <text x="540" y="562" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" fill="#7d8590" text-anchor="middle">réécrit, classe,</text>
  <text x="540" y="584" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" fill="#7d8590" text-anchor="middle">ajoute une date</text>
  <text x="540" y="620" font-family="SF Pro Display, -apple-system, sans-serif" font-size="30" text-anchor="middle">🤖</text>

  <!-- Arrow 2 -->
  <text x="730" y="506" font-family="SF Pro Display, -apple-system, sans-serif" font-size="52" fill="url(#orange)" text-anchor="middle">→</text>

  <!-- Step 3 -->
  <rect x="730" y="310" width="290" height="350" rx="24" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="875" cy="376" r="34" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="875" y="384" font-family="SF Pro Display, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#34d399" text-anchor="middle">3</text>
  <text x="875" y="453" font-family="SF Pro Display, -apple-system, sans-serif" font-size="54">✅</text>
  <text x="875" y="534" font-family="SF Pro Display, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#e6edf3" text-anchor="middle">C'est rangé</text>
  <text x="875" y="562" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" fill="#7d8590" text-anchor="middle">to-do, idées, notes,</text>
  <text x="875" y="584" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" fill="#7d8590" text-anchor="middle">appels… tout trié</text>
  <text x="875" y="620" font-family="SF Pro Display, -apple-system, sans-serif" font-size="30">🗂️</text>

  <!-- Example card -->
  <rect x="108" y="710" width="864" height="200" rx="20" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
  <text x="160" y="756" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" fill="#7d8590">Tu tapes :</text>
  <text x="160" y="790" font-family="SF Pro Display, -apple-system, sans-serif" font-size="20" fill="#e6edf3" font-style="italic">"faut que jappelle le dentiste mardi et acheter du lait"</text>
  <line x1="160" y1="812" x2="920" y2="812" stroke="#30363d" stroke-width="1"/>
  <text x="160" y="844" font-family="SF Pro Display, -apple-system, sans-serif" font-size="18" fill="#7d8590">Drople crée :</text>
  <rect x="330" y="828" width="100" height="30" rx="8" fill="#3b82f622" stroke="#3b82f655" stroke-width="1"/>
  <text x="380" y="848" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle">📞 Call</text>
  <rect x="450" y="828" width="120" height="30" rx="8" fill="#34d39922" stroke="#34d39955" stroke-width="1"/>
  <text x="510" y="848" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">✓ To-do</text>
  <text x="600" y="848" font-family="SF Pro Display, -apple-system, sans-serif" font-size="17" fill="#7d8590">📅 Mardi détecté</text>

  <text x="540" y="968" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="700" fill="url(#orange)" text-anchor="middle">dropleapp.com</text>
</svg>
