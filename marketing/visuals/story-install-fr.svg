  <rect x="60" y="580" width="960" height="310" rx="28" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="580" width="960" height="74" rx="28" fill="#f97316" fill-opacity="0.10"/>
  <rect x="60" y="624" width="960" height="30" fill="#f97316" fill-opacity="0.10"/>
  <text x="120" y="630" font-family="SF Pro Display, -apple-system, sans-serif" font-size="42">🍎</text>
