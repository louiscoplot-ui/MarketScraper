  <text x="120" y="1112" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" fill="#7d8590">②</text>
  <text x="168" y="1112" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#e6edf3">⋮ Menu en haut à droite</text>
