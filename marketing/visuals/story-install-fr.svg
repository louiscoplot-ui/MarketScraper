  <text x="168" y="1160" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#e6edf3">"Installer l'application"</text>
  <text x="120" y="1208" font-family="SF Pro Display, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#34d399">  ✓ Installé. Gratuit.</text>

