  <rect x="110" y="1296" width="860" height="120" rx="28" fill="url(#orange)" filter="url(#shadow)"/>
  <text x="540" y="1368" font-family="SF Pro Display, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#0d1117" text-anchor="middle">✓ Gratuit · Aucun téléchargement</text>

  <text x="540" y="1480" font-family="SF Pro Display, -apple-system, sans-serif" font-size="30" fill="#7d8590" text-anchor="middle">Ce que tu peux faire ensuite :</text>
