  <text x="540" y="1586" font-family="SF Pro Display, -apple-system, sans-serif" font-size="29" fill="#e6edf3" text-anchor="middle">📅 Calendrier  ·  🔔 Rappels  ·  👥 Groupes</text>

  <text x="540" y="1760" font-family="SF Pro Display, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#orange)" text-anchor="middle">dropleapp.com</text>
  <text x="540" y="1820" font-family="SF Pro Display, -apple-system, sans-serif" font-size="28" fill="#7d8590" text-anchor="middle">@dropleapp</text>
