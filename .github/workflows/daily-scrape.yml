name: Daily REIWA scrape

# Runs once per day at 02:00 Perth time (AWST = UTC+8, no DST).
# 02:00 AWST = 18:00 UTC the previous day.
on:
  schedule:
    - cron: '0 18 * * *'
  # Always allow a manual trigger from the Actions tab — useful for first
  # run, debugging, or kicking off an extra scrape during the day.
  workflow_dispatch:

# Prevent two scheduled runs from overlapping if a previous one is still
# going (e.g. very long REIWA response times).
concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # GitHub free tier hard cap is 360 min per job. Polite scrape of 15
    # suburbs lands well under that; raise progressively as we add more.
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        working-directory: backend
        run: |
          python -m playwright install --with-deps chromium

      - name: Run daily scrape
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/run_daily_scrape.py
