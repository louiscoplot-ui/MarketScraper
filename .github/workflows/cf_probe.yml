name: Cloudflare bypass probe (throwaway)

# Manual-only. Confirms Chromium (Playwright/patchright) can load REIWA
# through the working residential proxy (geo param on password).
# Credentials come from the SCRAPE_PROXY secret and are never printed.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + patchright
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install playwright patchright
          python -m playwright install --with-deps chromium
          python -m patchright install chromium

      - name: Run Chromium-through-proxy probe
        working-directory: backend
        env:
          SCRAPE_PROXY: ${{ secrets.SCRAPE_PROXY }}
        run: python scripts/cf_probe.py
