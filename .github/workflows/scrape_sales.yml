name: Daily REIWA sales scrape

# 00:00 Perth (AWST = UTC+8, no DST) = 16:00 UTC previous day.
# Split from the rental scrape so sales data lands ASAP and a rental
# failure can never delay it.
on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

concurrency:
  group: scrape-sales
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        working-directory: backend
        run: |
          python -m playwright install --with-deps chromium

      - name: Run daily scrape
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/run_daily_scrape.py
