name: Daily REIWA sales scrape

# 00:00 Perth (AWST = UTC+8, no DST) = 16:00 UTC previous day.
# Split from the rental scrape so sales data lands ASAP and a rental
# failure can never delay it.
# 0-5 = Sun–Fri UTC: skips Saturday 16:00 UTC = Sunday 00:00 Perth.
# Nobody lists on a Saturday, so that run only re-downloaded known
# listings through the billed proxy. The rare Saturday listing is
# picked up by Monday 00:00 Perth's run — first_seen shifts one day,
# nothing is lost.
on:
  schedule:
    - cron: '0 16 * * 0-5'
  workflow_dispatch:

concurrency:
  group: scrape-sales
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        working-directory: backend
        run: |
          python -m playwright install --with-deps chromium

      - name: Run daily scrape
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Residential proxy (IPRoyal) — routes the scrape through an AU
          # residential IP so REIWA's Cloudflare serves the real grid
          # instead of the "Just a moment" challenge it gives datacenter IPs.
          SCRAPE_PROXY: ${{ secrets.SCRAPE_PROXY }}
          # Morning digest pipeline reads these. EMAIL_FROM is the
          # short-circuit guard at the top of the digest pass — without
          # it set the cron logs "EMAIL_FROM not set" and exits silently.
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python scripts/run_daily_scrape.py
