name: Daily REIWA rental scrape

# 00:30 Perth (AWST = UTC+8, no DST) = 16:30 UTC previous day.
# Runs 30min after the sales scrape on an independent schedule so a
# stuck rental run cannot block sales (or vice versa).
on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

concurrency:
  group: scrape-rental
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        working-directory: backend
        run: |
          python -m playwright install --with-deps chromium

      - name: Scrape rental listings
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python rental_scraper.py
